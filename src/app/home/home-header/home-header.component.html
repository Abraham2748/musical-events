<header>
  <div class="container">
    <div class="logo-container">
      <img src="images/logo.png" alt="logo" />
      <h1>MUSICAL EVENTS</h1>
    </div>
    <div class="search-container">
      <input
        type="text"
        placeholder="Buscar..."
        [formControl]="searchBarFormControl"
      />
    </div>
    <div class="buttons-container">
      <button mat-button class="primary" routerLink="/login">INGRESAR</button>
      <button mat-button class="accent" routerLink="/register">
        REGÍSTRATE
      </button>
    </div>
  </div>
</header>
