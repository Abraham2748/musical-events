<header class="box-shadow">
  <div class="container">
    <div class="logo-container">
      <img src="images/logo.png" alt="logo" />
      <h1>MUSICAL EVENTS</h1>
    </div>
    <div class="search-container">
      <input
        type="text"
        placeholder="Buscar..."
        [formControl]="searchBarFormControl"
      />
    </div>
    @if(authService.getIsLoggedIn()){
    <div class="buttons-container">
      <button
        mat-button
        class="primary"
        [routerLink]="
          authService.getRole() === 'Administrator' ? '/admin' : '/customer'
        "
      >
        MENU
      </button>
      <button mat-button class="accent" (click)="authService.logout()">
        CERRAR SESIÓN
      </button>
    </div>
    } @else {
    <div class="buttons-container">
      <button mat-button class="primary" routerLink="/login">INGRESAR</button>
      <button mat-button class="accent" routerLink="/register">
        REGÍSTRATE
      </button>
    </div>
    }
  </div>
</header>
