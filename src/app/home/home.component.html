<app-header></app-header>
<div id="container">
  <section id="header">
    <mat-form-field>
      <mat-label>Genero musical</mat-label>
      <mat-select [formControl]="genreFormControl">
        @for (item of genres$ | async ; track $index) {
        <mat-option [value]="item.id">{{ item.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <div id="title">
      <span>Selecciona tu genero musical favorito</span>
    </div>
  </section>
  <section id="cards">
    @for (item of concerts$ | async; track $index) {
    <app-event-card></app-event-card>
    }
  </section>
</div>

<app-footer></app-footer>
