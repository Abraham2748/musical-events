<div class="container">
  <div class="concert-info">
    <span class="title">{{ data.title }}</span>
    <br />
    <span class="price"
      >PRECIO: <span>S/ {{ data.unitPrice.toFixed(2) }}</span></span
    >
  </div>
  <form>
    <mat-form-field appearance="outline">
      <mat-label>Cantidad</mat-label>
      <input
        type="number"
        matInput
        ngModel
        name="quantity"
        #quantity="ngModel"
        max="10"
        required
      />
      @if(quantity.hasError("required")){
      <mat-error>Campo requerido</mat-error>
      } @if(quantity.hasError("max")){
      <mat-error>10 compras como máximo</mat-error>
      }
    </mat-form-field>
    <br />
    <div class="total-container">
      <span>
        TOTAL: S/
        {{
          (data.unitPrice * (quantity.value ? quantity.value : 0)).toFixed(2)
        }}</span
      >
    </div>
  </form>
  <div class="actions">
    <button
      mat-flat-button
      [disabled]="quantity.invalid"
      (click)="buyTickets(quantity.value)"
    >
      PAGAR
    </button>
  </div>
</div>
